<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BBM Nasional 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f0f3f9;--sur:#fff;--sur2:#f7f8fc;--brd:#e2e8f0;
  --nv:#0f2057;--nv2:#1a3380;--nv3:#243fa0;
  --ac:#e8a020;--a2:#2563eb;--tx:#1a2035;--mu:#64748b;
  --sw:220px;--th:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--th);
  background:linear-gradient(135deg,var(--nv),var(--nv2));
  display:flex;align-items:center;padding:0 16px 0 0;
  box-shadow:0 2px 16px rgba(15,32,87,.3);}
.tb-br{width:var(--sw);min-width:var(--sw);display:flex;align-items:center;gap:10px;padding:0 16px;border-right:1px solid rgba(255,255,255,.1);}
.tb-lg{background:var(--ac);color:#fff;font-weight:800;font-size:11px;letter-spacing:2px;padding:4px 8px;border-radius:5px;}
.tb-ti{color:#fff;font-weight:700;font-size:13px;line-height:1.2;}
.tb-su{color:rgba(255,255,255,.5);font-size:10px;}
.tb-c{flex:1;display:flex;align-items:center;gap:10px;padding:0 16px;}
.tb-r{display:flex;align-items:center;gap:8px;}
.pw{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;padding:5px 10px;}
.pd{width:7px;height:7px;border-radius:50%;}.pda{background:#60a5fa;}.pdb{background:#fbbf24;}
.pl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);}
input[type=date]{background:transparent;border:none;color:#fff;font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;cursor:pointer;width:100px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.6;cursor:pointer;}
.ps{color:rgba(255,255,255,.3);font-size:11px;}
.btn{background:var(--ac);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.btn:hover{background:#d4901a;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-g{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-g:hover{background:rgba(255,255,255,.2);}
.btn-mode{background:transparent;color:rgba(255,255,255,.6);border:none;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-mode.active{background:var(--ac);color:#fff;}
.sdot{width:7px;height:7px;border-radius:50%;background:#475569;transition:background .3s;}
.sdot.ok{background:#10b981;}.sdot.err{background:#ef4444;}.sdot.loading{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.stx{font-size:10px;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;white-space:nowrap;}

/* LOADING */
.lo{display:none;position:fixed;inset:0;background:rgba(15,32,87,.75);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.lo.show{display:flex;}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.lo-txt{color:#fff;font-size:13px;font-weight:600;}
.lo-sub{color:rgba(255,255,255,.6);font-size:11px;font-family:'JetBrains Mono',monospace;}

/* MODAL HARGA */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;}
.mo.show{display:flex;}
.mdl{background:var(--sur);border-radius:14px;padding:26px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.mdl h2{font-size:15px;font-weight:800;color:var(--nv);margin-bottom:4px;}
.mdl-sub{font-size:11px;color:var(--mu);margin-bottom:16px;}
.ms{margin-bottom:14px;}
.ms-t{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--brd);}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.pc-t{font-size:10px;font-weight:800;margin-bottom:7px;}
.pr{display:flex;flex-direction:column;gap:5px;}
.pi{display:grid;grid-template-columns:72px 1fr;gap:6px;align-items:center;}
.pi label{font-size:11px;color:var(--mu);font-weight:600;}
input[type=number]{background:var(--sur2);border:1px solid var(--brd);color:var(--tx);padding:6px 8px;border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;width:100%;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--brd);}
.btn-sv{background:var(--nv);color:#fff;border:none;padding:8px 20px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-cn{background:var(--sur2);color:var(--mu);border:1px solid var(--brd);padding:8px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}

/* SIDEBAR */
.sb{position:fixed;top:var(--th);left:0;bottom:0;width:var(--sw);background:var(--nv);overflow-y:auto;overflow-x:hidden;border-right:1px solid rgba(255,255,255,.06);z-index:200;}
.sb::-webkit-scrollbar{width:3px;}.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}
.sb-section{padding:10px 14px 4px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);}
.sg{padding:2px 0;}
.sg-l{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:6px 14px 3px;display:flex;align-items:center;gap:6px;}
.sg-l::before{content:'';width:3px;height:10px;border-radius:2px;background:var(--gc,rgba(255,255,255,.2));}
.si{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;}
.si:hover{background:rgba(255,255,255,.06);}
.si.active{background:rgba(255,255,255,.1);border-left-color:var(--ac);}
.si-d{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.si-n{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);}
.si.active .si-n{color:#fff;}
.si-c{margin-left:auto;font-size:9px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.sd{height:1px;background:rgba(255,255,255,.06);margin:4px 0;}

/* MAIN */
.main{margin-top:var(--th);margin-left:var(--sw);padding:20px 24px;}

/* PAGE TITLE */
.pt{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.pt-t{font-size:18px;font-weight:800;color:var(--nv);}
.pt-t span{font-size:12px;font-weight:500;color:var(--mu);margin-left:8px;}
.pcs{display:flex;gap:6px;}
.chip{font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;}
.ca{background:#dbeafe;color:#1e40af;}.cb{background:#fef3c7;color:#92400e;}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kc{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,#2563eb);}
.kl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:7px;}
.kv{display:flex;gap:5px;align-items:baseline;flex-wrap:wrap;margin-bottom:3px;}
.kva{font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#2563eb;}
.kvb{font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#f59e0b;}
.ksp{font-size:11px;color:var(--brd);}
.kd{display:inline-flex;align-items:center;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:4px;}
.dg{background:#dcfce7;color:#166534;}.db2{background:#fee2e2;color:#991b1b;}.dn{background:#f1f5f9;color:#64748b;}

/* MAP */
.map-card{background:var(--sur);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:0;}
.map-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);}
.map-title{font-size:12px;font-weight:700;color:var(--tx);}
.map-sub{font-size:10px;color:var(--mu);margin-top:2px;}
#leafletMap{width:100%;height:420px;}
.bbm-tooltip{background:#1a2035!important;color:#fff!important;border:none!important;border-radius:6px!important;font-family:'Plus Jakarta Sans',sans-serif!important;font-size:11px!important;padding:6px 10px!important;}
.bbm-tooltip::before{border-top-color:#1a2035!important;}
.site-popup{position:absolute;z-index:9999;background:#fff;border:1px solid var(--brd);border-radius:10px;padding:14px 16px;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.15);pointer-events:auto;}
.popup-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.popup-close{background:none;border:none;cursor:pointer;color:var(--mu);font-size:14px;line-height:1;padding:0;}
.popup-site{font-size:13px;font-weight:800;color:var(--nv);margin-bottom:3px;}
.gb{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;}
.popup-table{width:100%;border-collapse:collapse;}
.popup-table td{padding:4px 0;font-size:11px;}
.popup-table td:last-child{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right;color:var(--tx);}
.popup-table td:first-child{font-size:10px;color:var(--mu);font-weight:600;}

/* SECTION */
.sec{margin-bottom:22px;}
.sh{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--brd);}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:16px 18px;}
.ct{font-size:11px;font-weight:700;color:var(--tx);margin-bottom:3px;}
.cs{font-size:10px;color:var(--mu);margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:14px;margin-bottom:16px;}
.g2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:16px;}
.g2b{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
canvas{max-height:240px;}

/* TABLE */
.tw{overflow-x:auto;}
table.t{width:100%;border-collapse:collapse;}
table.t th{background:var(--sur2);font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:7px 10px;text-align:left;border-bottom:1px solid var(--brd);white-space:nowrap;}
table.t td{padding:7px 10px;font-size:11px;border-bottom:1px solid var(--brd);white-space:nowrap;}
table.t tr:last-child td{border-bottom:none;}
table.t tr:hover td{background:var(--sur2);}
.mn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;}
.tb2{font-weight:700;font-size:12px;}
.dp{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.dpg{background:#dcfce7;color:#166534;}.dpb{background:#fee2e2;color:#991b1b;}.dpn{background:#f1f5f9;color:#64748b;}
.fc{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;}
.fcs{background:#fef3c7;color:#92400e;}.fcd{background:#fee2e2;color:#991b1b;}.fcp{background:#dbeafe;color:#1e40af;}.fcx{background:#ede9fe;color:#5b21b6;}
.et{width:100%;border-collapse:collapse;}
.et th{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:6px 10px;text-align:left;border-bottom:1px solid var(--brd);}
.et td{padding:8px 10px;font-size:11px;border-bottom:1px solid var(--brd);}
.et tr:last-child td{border-bottom:none;}
.em{font-weight:700;}.ea{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2563eb;font-weight:600;}
.eb{font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;font-weight:600;}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.tc{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.tr2{position:absolute;top:10px;right:12px;font-size:22px;font-weight:800;color:var(--brd);font-family:'JetBrains Mono',monospace;line-height:1;}
.ts{font-size:12px;font-weight:800;color:var(--nv);margin-bottom:5px;}
.tp{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#ef4444;margin-bottom:3px;}
.tm{font-size:10px;color:var(--mu);line-height:1.6;}
.tde{font-size:10px;font-weight:700;margin-top:5px;}
.tbb{margin-top:6px;background:var(--brd);border-radius:3px;height:3px;}
.tbf{height:3px;border-radius:3px;background:#ef4444;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.rc{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;display:flex;gap:10px;}
.rn{font-size:22px;font-weight:800;color:var(--brd);font-family:'JetBrains Mono',monospace;line-height:1.1;flex-shrink:0;}
.rt{font-size:11px;font-weight:800;color:var(--nv);margin-bottom:3px;}
.rb{font-size:10px;color:var(--mu);line-height:1.6;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}
@media(max-width:1100px){.kg{grid-template-columns:repeat(2,1fr);}.g3,.g2,.g2b{grid-template-columns:1fr;}.tg{grid-template-columns:1fr 1fr;}.rg{grid-template-columns:1fr;}}
</style>
</head>

<script>
// ============================================================
// CONFIG
// ============================================================
const REPO_BASE = 'https://raw.githubusercontent.com/heylilyloops/Dashboard-Fuel-Usage-/main/data';

const GROUPS = {
  NDC:{label:'NDC',color:'#eab308',sites:['AHI JABABEKA','HCI JABABEKA','KLS JABABEKA','HCI CIKUPA','SDA']},
  RDC:{label:'RDC',color:'#06b6d4',sites:['TALLO','TAMORA']},
  HUB:{label:'Hub',color:'#6366f1',sites:['HUB HCI','HUB AHI','HUB HCI BOGOR','HUB HCI TANGERANG','HUB HCI UTARA','HUB HCI BANDUNG','HUB HCI TASIK','HUB HCI SEMARANG','HUB HCI YOGYA','HUB HCI LAMPUNG','HUB HCI PALEMBANG']},
  SDC:{label:'SDC',color:'#f97316',sites:['SDC BATAM','SDC SAMARINDA','SDC P PINANG','SDC PONTIANAK','SDC TARAKAN','SDC BANJARMASIN','SDC MANADO','SDC MALUKU','SDC KENDARI','SDC TERNATE','SDC SORONG','SDC ABEPURA','SDC PALU','SDC NAGOYA']}
};

const GITHUB_API = 'https://api.github.com/repos/heylilyloops/Dashboard-Fuel-Usage-/contents/data';

async function getSiteCSVList(){
  try{
    const resp = await fetch(GITHUB_API);
    if(!resp.ok) throw new Error('API error');
    const files = await resp.json();
    return files
      .filter(f => f.name.endsWith('.csv') && f.name !== '.gitkeep')
      .map(f => f.name);
  } catch(e){
    console.warn('GitHub API fallback:', e);
    // Fallback ke list hardcoded kalau API gagal
    return [
      'AHI_JABABEKA.csv','HCI_JABABEKA.csv','KLS_JABABEKA.csv','HCI_CIKUPA.csv',

const pn=v=>{const n=parseFloat(String(v||0).replace(',','.'));return isNaN(n)?0:n;};
const fL=v=>Math.round(v).toLocaleString('id-ID')+' Ltr';
const fS=v=>{const a=Math.abs(v);if(a>=1e9)return'Rp '+(v/1e9).toFixed(2)+' M';if(a>=1e6)return'Rp '+(v/1e6).toFixed(1)+' Jt';return'Rp '+Math.round(v).toLocaleString('id-ID');};
const fP=(v,d=2)=>(v*100).toFixed(d)+'%';
const fD=s=>{try{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return s;}};
const grpOf=s=>{for(const[k,g]of Object.entries(GROUPS))if(g.sites.includes(s))return{key:k,...g};return null;};
const getPx=p=>{const x=p==='a'?'pa':'pb';return{Solar:pn(document.getElementById(x+'_s').value)||6800,Dexlite:pn(document.getElementById(x+'_d').value)||14300,Pertalite:pn(document.getElementById(x+'_p').value)||10000,Pertamax:pn(document.getElementById(x+'_x').value)||12300};};
const dcls=(d,lg)=>d===0?'dn':(lg?(d<0?'dg':'db2'):(d>0?'dg':'db2'));
const dpcls=(d,lg)=>d===0?'dpn':(lg?(d<0?'dpg':'dpb'):(d>0?'dpg':'dpb'));
const isSDC=s=>{const g=grpOf(s);return g&&g.key==='SDC';};
const csvToSite=f=>f.replace('.csv','').replace(/_/g,' ');

function parseDate(raw){
  if(!raw) return null;
  if(raw.includes('/')){const p=raw.split('/');if(p.length===3){const d=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));return isNaN(d)?null:d;}}
  const d=new Date(raw+'T00:00:00');return isNaN(d)?null:d;
}
function fRows(rows,s,e){
  const sd=new Date(s+'T00:00:00'),ed=new Date(e+'T00:00:00');ed.setHours(23,59,59,999);
  return rows.filter(r=>{const d=parseDate(r.d);return d&&d>=sd&&d<=ed;});
}
function agg(rows,pOld,pNew){
  const bF={},bJ={};let tQ=0,cB=0,cA=0,dQ=0,dcA=0;
  rows.forEach(r=>{
    const f=normF(r.f),q=pn(r.q),j=(r.j||'').trim()||'—';
    const po=pOld[f]||0,pn2=pNew[f]||0;
    tQ+=q;cB+=q*po;cA+=q*pn2;
    if(f==='Dexlite'){dQ+=q;dcA+=q*pn2;}
    if(!bF[f])bF[f]={q:0,cB:0,cA:0};
    bF[f].q+=q;bF[f].cB+=q*po;bF[f].cA+=q*pn2;
    if(!bJ[j])bJ[j]={};
    if(!bJ[j][f])bJ[j][f]={q:0,cB:0,cA:0};
    bJ[j][f].q+=q;bJ[j][f].cB+=q*po;bJ[j][f].cA+=q*pn2;
  });
  const dcB=dQ*(pOld['Dexlite']||0);
  return{bF,bJ,tQ,cB,cA,imp:cA-cB,dQ,dImp:dcA-dcB,dcA,trip:rows.length};
}

// CSV
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const headers=splitLine(lines[0]);
  return lines.slice(1).map(l=>{const v=splitLine(l);const r={};headers.forEach((h,i)=>r[h.trim()]=v[i]||'');return r;}).filter(r=>Object.values(r).some(v=>v.trim()));
}
function splitLine(line){
  const res=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){if(line[i]==='"'){inQ=!inQ;}else if(line[i]===','&&!inQ){res.push(cur.trim().replace(/^"|"$/g,''));cur='';}else cur+=line[i];}
  res.push(cur.trim().replace(/^"|"$/g,''));return res;
}
function csvToRows(text){
  return parseCSV(text).map(r=>({
    d:r['Delivery Date']||'',f:r["Fuel's Type"]||'Solar',
    q:pn(r['Qty Fuel']),j:r['Jalur']||'',i:pn(r['BBM IDR'])
  })).filter(r=>r.q>0||r.i>0);
}

async function loadAll(){

  document.getElementById('stx').textContent='Memuat...';
  siteData={};loadedSites=[];

  document.getElementById('lo-sub').textContent='Mengambil daftar site...';
  const csvList = await getSiteCSVList();
  document.getElementById('lo-sub').textContent=`0 / ${csvList.length} site...`;
  await Promise.allSettled(csvList.map(async csv=>{
    try{
      const resp=await fetch(`${REPO_BASE}/${csv}`);
      if(!resp.ok)throw new Error('404');
      const text=await resp.text();
      const rows=csvToRows(text);
      if(!rows.length)throw new Error('empty');
      const site=csvToSite(csv);
      siteData[site]=rows;loadedSites.push(site);loaded++;
      document.getElementById('lo-sub').textContent=`${loaded} site loaded...`;
    }catch(e){}
  }));
  document.getElementById('lo').classList.remove('show');
  document.getElementById('btnLoad').disabled=false;
  if(!loadedSites.length){document.getElementById('sdot').className='sdot err';document.getElementById('stx').textContent='Gagal load';return;}
  document.getElementById('sdot').className='sdot ok';
  document.getElementById('stx').textContent=`${loadedSites.length} site`;
  buildSB();render();
}

    {l:'Dexlite Volume',va:fL(a.dQ),vb:fL(b.dQ),d:b.dQ-a.dQ,f:v=>fL(Math.abs(v)),lg:true,c:'#ef4444'},

    {l:'% Impact / Cost',va:fP(ipA),vb:fP(ipB),d:(ipB-ipA)*100,f:v=>Math.abs(v).toFixed(2)+'pp',lg:true,c:'#f59e0b'},

    {l:'Cost Before',va:fS(a.cB),vb:fS(b.cB),d:b.cB-a.cB,f:v=>fS(Math.abs(v)),lg:true,c:'#0891b2'},
    {l:'Dexlite % Vol',va:fP(dpA),vb:fP(dpB),d:(dpB-dpA)*100,f:v=>Math.abs(v).toFixed(2)+'pp',lg:true,c:'#f97316'},
  ];

  document.getElementById('popupContent').innerHTML=h;
  const popup=document.getElementById('sitePopup');
  popup.style.left=x+'px';popup.style.top=y+'px';popup.style.display='block';
}

function showPopup(site,grp,b,e){
  const mapEl=document.getElementById('leafletMap');
  const rect=mapEl.getBoundingClientRect();
  let x=e.originalEvent.clientX-rect.left+12,y=e.originalEvent.clientY-rect.top-12;
  if(x+240>rect.width)x=e.originalEvent.clientX-rect.left-252;
  if(y+200>rect.height)y=e.originalEvent.clientY-rect.top-210;
  showPopupDirect(site,grp,b,x,y);
}

function rInsight(el,aggA,aggB,aS,aE,bS,bE,pA,pB){

function rTop(el,aggA,aggB,aS,aE,bS,bE,pA,pB){
  let items=[];
  if(VIEW==='NASIONAL'){
    loadedSites.forEach(s=>{
      const r=siteData[s]||[];
      const a2=agg(fRows(r,aS,aE),pA,pA),b2=agg(fRows(r,bS,bE),pA,pB);
      const grp=grpOf(s);
      items.push({n:s,grp,pA:a2.cA>0?a2.dImp/a2.cA:0,pB:b2.cA>0?b2.dImp/b2.cA:0,dQB:b2.dQ,iB:b2.dImp,iA:a2.dImp});
    });
  } else {
    const allJ=new Set([...Object.keys(aggA.bJ),...Object.keys(aggB.bJ)]);
    allJ.forEach(j=>{
      if(j==='—')return;
      const ja=aggA.bJ[j]||{},jb=aggB.bJ[j]||{};
      const sum=(d,k)=>Object.values(d).reduce((s,v)=>s+(v[k]||0),0);
      const cAA=sum(ja,'cA'),cAB=sum(jb,'cA'),iA=cAA-sum(ja,'cB'),iB=cAB-sum(jb,'cB');
      items.push({n:j,grp:null,pA:cAA>0?iA/cAA:0,pB:cAB>0?iB/cAB:0,dQB:(jb['Dexlite']||{}).q||0,iB,iA});
    });
  }
  items.sort((x,y)=>y.pB-x.pB);
  const top6=items.filter(r=>r.pB>0).slice(0,6);
  if(!top6.length)return;
  const sec=mSec(el,'Top Impact — Dampak Kenaikan Dexlite Tertinggi (Periode B)');
  const g=document.createElement('div');g.className='tg';sec.appendChild(g);
  top6.forEach((r,i)=>{
    const d=(r.pB-r.pA)*100,gc=r.grp?r.grp.color:'#64748b';
    const div=document.createElement('div');div.className='tc';
    div.innerHTML=`<div class="tr2">${String(i+1).padStart(2,'0')}</div>
      <div class="ts">${r.n}</div>
      ${r.grp?`<span class="gb" style="background:${gc}22;color:${gc};margin-bottom:5px;display:inline-block">${r.grp.label}</span>`:`<span class="gb" style="background:#f1f5f9;color:#64748b;margin-bottom:5px;display:inline-block">Jalur</span>`}
      <div class="tp">${fP(r.pB)}</div>
      <div class="tm">Dexlite: ${fL(r.dQB)} | Impact: ${fS(r.iB)}<br>Periode A: ${fP(r.pA)} | ${fS(r.iA)}</div>
      <div class="tde" style="color:${d>=0?'#dc2626':'#059669'}">${d>=0?'▲ +':'▼ '}${Math.abs(d).toFixed(2)}pp vs Periode A</div>
      <div class="tbb"><div class="tbf" style="width:${Math.min(r.pB*100,100)}%"></div></div>`;
    g.appendChild(div);
  });
}

function rReko(el,aggA,aggB,aS,aE,bS,bE,pA,pB){
  const sec=mSec(el,'Tindak Lanjut & Rekomendasi');
  const rekoList=[];

  // Hitung per site
  const siteStats=loadedSites.map(s=>{
    const r=siteData[s]||[];
    const a2=agg(fRows(r,aS,aE),pA,pA),b2=agg(fRows(r,bS,bE),pA,pB);
    const dpA=a2.tQ>0?a2.dQ/a2.tQ:0,dpB=b2.tQ>0?b2.dQ/b2.tQ:0;
    const ipA=a2.cA>0?a2.dImp/a2.cA:0,ipB=b2.cA>0?b2.dImp/b2.cA:0;
    return{s,dpA,dpB,ipA,ipB,tQA:a2.tQ,tQB:b2.tQ,tripA:a2.trip,tripB:b2.trip};
  });

  // === RULE 1: Dexlite > 60% → Kelangkaan permanen → EV ===
  const evSites=siteStats.filter(x=>x.dpB>0.6).sort((a,b)=>b.dpB-a.dpB);
  if(evSites.length>0){
    const names=evSites.slice(0,3).map(x=>`<b>${x.s}</b> (${fP(x.dpB,0)})`).join(', ');
    const extra=evSites.length>3?` dan ${evSites.length-3} site lainnya`:'';
    rekoList.push({
      icon:'⚡',
      title:'Kelangkaan Bio Solar Permanen — Evaluasi Armada EV',
      body:`${names}${extra} memiliki proporsi Dexlite >60% dari total konsumsi. Bio Solar kemungkinan tidak tersedia permanen di area ini. Percepat penjajakan armada EV sebagai pengganti diesel — perhitungan TCO bersama distributor Foton / PT Indomobil perlu diprioritaskan.`,
      level:'high'
    });
  }

  // === RULE 2: Dexlite 20-60% → Kelangkaan sementara → Barcode/Nopol ===
  const barcodeSites=siteStats.filter(x=>x.dpB>=0.2&&x.dpB<=0.6).sort((a,b)=>b.dpB-a.dpB);
  if(barcodeSites.length>0){
    const names=barcodeSites.slice(0,3).map(x=>`<b>${x.s}</b> (${fP(x.dpB,0)})`).join(', ');
    const extra=barcodeSites.length>3?` dan ${barcodeSites.length-3} lainnya`:'';
    rekoList.push({
      icon:'🔍',
      title:'Barcode & Kelangkaan Bio Solar — Tindak Lanjut',
      body:`${names}${extra} masih menggunakan Dexlite 20–60% dari total konsumsi. Lanjutkan pencarian Bio Solar, koordinasi ke Pertamina untuk barcode bermasalah. Pertimbangkan mutasi Nopol untuk armada yang terkendala akses Bio Solar.`,
      level:'medium'
    });
  }

  // === RULE 3: % Impact naik MoM > 2pp ===
  const impactNaik=siteStats.filter(x=>(x.ipB-x.ipA)*100>2).sort((a,b)=>(b.ipB-b.ipA)-(a.ipB-a.ipA));
  if(impactNaik.length>0){
    const names=impactNaik.slice(0,3).map(x=>`<b>${x.s}</b> (+${((x.ipB-x.ipA)*100).toFixed(1)}pp)`).join(', ');
    rekoList.push({
      icon:'📈',
      title:'Monitoring Ketat — Impact Kenaikan Dexlite Meningkat',
      body:`${names} menunjukkan kenaikan % impact Dexlite terhadap total cost >2pp dibanding periode sebelumnya. Lakukan monitoring mingguan konsumsi Dexlite dan pastikan tidak ada penambahan armada diesel baru di area dengan kelangkaan Bio Solar.`,
      level:'medium'
    });
  }

  // === RULE 4: Liter naik tapi Trip turun (inefisiensi) ===
  const inefisien=siteStats.filter(x=>x.tQB>x.tQA*1.05&&x.tripB<x.tripA).sort((a,b)=>(b.tQB/b.tripB)-(a.tQB/a.tripB));
  if(inefisien.length>0){
    const names=inefisien.slice(0,3).map(x=>`<b>${x.s}</b>`).join(', ');
    rekoList.push({
      icon:'🚚',
      title:'Efisiensi Rute & OLF Perlu Diperhatikan',
      body:`${names} menunjukkan konsumsi BBM naik >5% sementara jumlah trip turun — indikasi inefisiensi rute atau OLF rendah. Pastikan volume muat maksimal, akurasi routing ditingkatkan, dan DO/DP per LC dimaksimalkan untuk turunkan cost per DO & DP.`,
      level:'low'
    });
  }

  // === RULE 5: % Impact nasional > 5% ===
  const ipNasB=aggB.cA>0?aggB.dImp/aggB.cA:0;
  if(ipNasB>0.05){
    rekoList.push({
      icon:'💰',
      title:'Review Struktur Biaya BBM Nasional',
      body:`Impact kenaikan Dexlite secara nasional mencapai <b>${fP(ipNasB,2)}</b> dari total cost BBM Periode B. Angka ini signifikan dan perlu menjadi perhatian manajemen. Pertimbangkan negosiasi kontrak harga Dexlite atau percepatan program diversifikasi BBM.`,
      level:'high'
    });
  }

  // Kalau tidak ada rekomendasi
  if(rekoList.length===0){
    rekoList.push({
      icon:'✅',
      title:'Kondisi BBM Dalam Batas Normal',
      body:'Tidak ada anomali signifikan pada periode ini. Proporsi Dexlite terkendali dan impact kenaikan harga masih minimal. Pertahankan monitoring rutin mingguan.',
      level:'good'
    });
  }

  const levelColor={high:'#fee2e2',medium:'#fef3c7',low:'#dbeafe',good:'#dcfce7'};
  const levelBorder={high:'#ef4444',medium:'#f59e0b',low:'#3b82f6',good:'#10b981'};

  const g=document.createElement('div');
  g.style.cssText='display:flex;flex-direction:column;gap:12px;';
  rekoList.forEach((r,i)=>{
    const d=document.createElement('div');
    d.style.cssText=`background:${levelColor[r.level]};border:1px solid ${levelBorder[r.level]};border-left:4px solid ${levelBorder[r.level]};border-radius:10px;padding:14px 18px;display:flex;gap:12px;`;
    d.innerHTML=`
      <div style="font-size:22px;line-height:1;flex-shrink:0;">${r.icon}</div>
      <div>
        <div style="font-size:12px;font-weight:800;color:var(--nv);margin-bottom:4px;">${String(i+1).padStart(2,'0')}. ${r.title}</div>
        <div style="font-size:11px;color:var(--mu);line-height:1.7;">${r.body}</div>
      </div>`;
    g.appendChild(d);
  });
  sec.appendChild(g);
}

Chart.defaults.color='#64748b';
Chart.defaults.font.family='Plus Jakarta Sans';
loadAll();
</script>
